<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SANET — Salud en Red</title>
<style>
  :root {
    --primary: #2563EB;
    --primary-dark: #1D4ED8;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --text: #111827;
    --text-secondary: #4B5563;
    --border: #E5E7EB;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E0E10;
      --surface: #1C1C1E;
      --text: #F4F4F5;
      --text-secondary: #9CA3AF;
      --border: #2C2C2E;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap {
    max-width: 480px;
    padding: 48px 32px;
    text-align: center;
  }
  .logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 32px;
    margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 8px;
    letter-spacing: -0.5px;
  }
  .tagline {
    color: var(--text-secondary);
    font-size: 15px;
    margin: 0 0 32px;
  }
  p.desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin: 0 0 32px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  a.btn {
    display: block;
    padding: 12px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border);
    color: var(--text);
    background: var(--surface);
    transition: opacity 0.15s;
  }
  a.btn:hover { opacity: 0.8; }
  a.btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">S</div>
    <h1>SANET</h1>
    <p class="tagline">Salud en Red — República Dominicana</p>
    <p class="desc">
      Encuentra hospitales, clínicas, farmacias y laboratorios cerca de ti.
      Consulta tu cobertura de ARS por plan y navega hasta el centro de salud
      que necesitas, todo dentro de la app.
    </p>
    <div class="links">
      <a class="btn" href="https://victortejeda.github.io/sanet-legal/">Política de Privacidad</a>
      <a class="btn" href="mailto:developervt09@gmail.com">Contacto</a>
    </div>
    <footer>© 2026 SANET — Salud en Red</footer>
  </div>
</body>
</html>
